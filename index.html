<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstyle - Gestión</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; margin: 0; padding: 15px; }
        .card { background-color: #FFF; border-radius: 12px; padding: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; font-size: 1.1rem; color: #1c1c1e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #E5E5EA; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #007AFF; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 16px; margin-bottom: 5px; }
        
        .turno-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f2f2f7; border-radius: 8px; }
        .turno-hoy { border-left: 5px solid #007AFF; background-color: #F0F7FF; }
        
        .btn-delete { background-color: #FF3B30; padding: 8px 0; font-size: 0.85rem; color: white; border-radius: 8px; border: none; width: 80px; flex-shrink: 0; text-align: center; }
        .btn-pay { background-color: #34C759; padding: 8px 0; font-size: 0.85rem; color: white; border-radius: 8px; border: none; width: 80px; flex-shrink: 0; text-align: center; }
        
        .card-blue { background-color: #007AFF; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .historial { color: #8e8e93; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Nuevo Turno</h3>
        <input type="text" id="nombre" placeholder="Nombre del cliente">
        <input type="date" id="fecha" onchange="actualizarHorarios()">
        <select id="hora"><option>Selecciona fecha primero</option></select>
        <button onclick="guardarTurno()">Reservar</button>
    </div>

    <div class="card">
        <h3>Pendientes de Pago (Fiados)</h3>
        <input type="text" id="nombre-fiado" placeholder="Nombre del cliente">
        <button onclick="agregarFiado()" style="background-color: #FF9500;">Agregar a Pendientes</button>
        <div id="contenedor-pendientes"></div>
    </div>

    <div class="card card-blue">
        <h3>Recaudación Semanal</h3>
        <p id="total-recaudado" style="font-size: 1.25rem; font-weight: bold; margin: 0;">$0</p>
    </div>

    <div class="card">
        <h3>Próximos Turnos</h3>
        <div id="contenedor-proximos"></div>
        <hr style="border: 0; border-top: 1px solid #f2f2f7; margin: 15px 0;">
        <h3 style="font-size: 0.9rem; color: #8e8e93;">Historial</h3>
        <div id="contenedor-historial"></div>
    </div>

    <script>
        const PRECIO_CORTE = 15000;
        const todosLosHorarios = ["10:20", "11:00", "11:40", "12:20", "13:00", "14:40", "15:20", "16:00", "16:40", "17:20", "18:00", "18:40", "19:20", "20:00", "20:40", "21:20"];
        
        let turnos = JSON.parse(localStorage.getItem('turnos_iphone')) || [];
        let fiados = JSON.parse(localStorage.getItem('fiados_iphone')) || [];

        function renderizar() {
            // Render Turnos
            turnos.sort((a, b) => new Date(a.fecha + 'T' + a.hora) - new Date(b.fecha + 'T' + b.hora));
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const fechaHoyString = new Date().toISOString().split('T')[0];
            const proximos = document.getElementById('contenedor-proximos');
            const historial = document.getElementById('contenedor-historial');
            proximos.innerHTML = ''; historial.innerHTML = '';

            turnos.forEach(t => {
                const esPasado = new Date(t.fecha + 'T00:00:00') < hoy;
                const html = `<div class="turno-row ${t.fecha === fechaHoyString ? 'turno-hoy' : ''}">
                    <div><strong>${t.nombre}</strong><br><span class="${esPasado ? 'historial' : ''}">${t.fecha} • ${t.hora} hs</span></div>
                    ${!esPasado ? `<button class="btn-delete" onclick="eliminarTurno(${t.id})">Anular</button>` : ''}
                </div>`;
                esPasado ? historial.innerHTML += html : proximos.innerHTML += html;
            });

            // Render Fiados
            const contFiados = document.getElementById('contenedor-pendientes');
            contFiados.innerHTML = '';
            fiados.forEach(f => {
                contFiados.innerHTML += `<div class="turno-row">
                    <strong>${f.nombre}</strong>
                    <div>
                        <button class="btn-pay" onclick="pagarFiado(${f.id})">Pagado</button>
                        <button class="btn-delete" onclick="eliminarFiado(${f.id})">Eliminar</button>
                    </div>
                </div>`;
            });

            calcularRecaudacion();
        }

        function agregarFiado() {
            const nombre = document.getElementById('nombre-fiado').value;
            if (!nombre) return alert("Ingresa un nombre");
            fiados.push({ id: Date.now(), nombre });
            localStorage.setItem('fiados_iphone', JSON.stringify(fiados));
            document.getElementById('nombre-fiado').value = '';
            renderizar();
        }

        function pagarFiado(id) {
            fiados = fiados.filter(f => f.id !== id);
            localStorage.setItem('fiados_iphone', JSON.stringify(fiados));
            renderizar();
        }

        function eliminarFiado(id) {
            if (confirm("¿Eliminar este pendiente?")) {
                fiados = fiados.filter(f => f.id !== id);
                localStorage.setItem('fiados_iphone', JSON.stringify(fiados));
                renderizar();
            }
        }

        // Funciones existentes (guardarTurno, eliminarTurno, etc) se mantienen igual
        function guardarTurno() {
            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            if (!nombre || !fecha || !hora) return alert("Completa todos los campos");
            turnos.push({ id: Date.now(), nombre, fecha, hora });
            localStorage.setItem('turnos_iphone', JSON.stringify(turnos));
            document.getElementById('nombre').value = '';
            actualizarHorarios();
            renderizar();
        }

        function eliminarTurno(id) {
            turnos = turnos.filter(t => t.id !== id);
            localStorage.setItem('turnos_iphone', JSON.stringify(turnos));
            actualizarHorarios();
            renderizar();
        }

        function actualizarHorarios() {
            const fecha = document.getElementById('fecha').value;
            const select = document.getElementById('hora');
            const ocupados = turnos.filter(t => t.fecha === fecha).map(t => t.hora);
            select.innerHTML = '<option value="">Selecciona hora</option>';
            todosLosHorarios.forEach(h => { if (!ocupados.includes(h)) select.innerHTML += `<option value="${h}">${h}</option>`; });
        }

        function calcularRecaudacion() {
            const haceUnaSemana = new Date(); haceUnaSemana.setDate(haceUnaSemana.getDate() - 7);
            const total = turnos.filter(t => new Date(t.fecha + 'T00:00:00') >= haceUnaSemana).length * PRECIO_CORTE;
            document.getElementById('total-recaudado').innerText = '$' + total.toLocaleString('es-AR');
        }

        renderizar();
    </script>
</body>
</html>
