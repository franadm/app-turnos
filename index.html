<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstyle - Gestión Final</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 15px; }
        .card { background-color: #1c1c1e; border-radius: 12px; padding: 16px; margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 1.1rem; color: #fff; }
        input, select { width: 100%; padding: 12px; border: 1px solid #3a3a3c; border-radius: 10px; margin-bottom: 10px; background-color: #2c2c2e; color: white; }
        button { width: 100%; background-color: #007AFF; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; margin-bottom: 5px; }
        .turno-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #3a3a3c; }
        .btn-pay { background-color: #34C759; padding: 8px; border-radius: 8px; border: none; color: white; }
        .card-blue { background-color: #007AFF; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Precio estándar ($)</h3>
        <input type="number" id="input-precio" onchange="actualizarPrecio()">
    </div>

    <div class="card">
        <h3>Nuevo Turno</h3>
        <input type="text" id="nombre" placeholder="Nombre cliente">
        <input type="date" id="fecha">
        <button onclick="guardarTurno()">Agendar Turno</button>
    </div>

    <div class="card-blue">
        <h3>Recaudación Real Semanal</h3>
        <p id="total-recaudado" style="font-size: 1.8rem; font-weight: bold; margin: 0;">$0</p>
    </div>

    <div class="card">
        <h3>Turnos Pendientes de Cobro</h3>
        <div id="contenedor-pendientes"></div>
    </div>

    <script>
        let PRECIO = parseInt(localStorage.getItem('precio_corte')) || 15000;
        document.getElementById('input-precio').value = PRECIO;
        
        // Lista de turnos: {nombre, fecha, pagado: true/false}
        let turnos = JSON.parse(localStorage.getItem('turnos_gestion')) || [];

        function actualizarPrecio() {
            PRECIO = parseInt(document.getElementById('input-precio').value);
            localStorage.setItem('precio_corte', PRECIO);
        }

        function guardarTurno() {
            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha').value;
            if(!nombre) return alert("Poné un nombre");
            
            turnos.push({ id: Date.now(), nombre, fecha, pagado: false });
            localStorage.setItem('turnos_gestion', JSON.stringify(turnos));
            document.getElementById('nombre').value = '';
            renderizar();
        }

        function cobrarTurno(id) {
            const t = turnos.find(x => x.id === id);
            if(confirm(`¿Confirmar cobro de $${PRECIO} a ${t.nombre}?`)) {
                t.pagado = true;
                localStorage.setItem('turnos_gestion', JSON.stringify(turnos));
                renderizar();
            }
        }

        function renderizar() {
            const contenedor = document.getElementById('contenedor-pendientes');
            contenedor.innerHTML = '';
            let total = 0;

            turnos.forEach(t => {
                if(!t.pagado) {
                    contenedor.innerHTML += `<div class="turno-row">
                        ${t.nombre} 
                        <button class="btn-pay" onclick="cobrarTurno(${t.id})">Cobrar $${PRECIO}</button>
                    </div>`;
                } else {
                    total += PRECIO;
                }
            });

            document.getElementById('total-recaudado').innerText = '$' + total.toLocaleString();
        }

        renderizar();
    </script>
</body>
</html>
