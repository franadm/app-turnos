<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstyle - Turnos</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; margin: 0; padding: 15px; }
        .card { background-color: #FFF; border-radius: 12px; padding: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; font-size: 1.1rem; color: #1c1c1e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #E5E5EA; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #007AFF; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 16px; }
        
        .turno-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f2f2f7; border-radius: 8px; }
        /* Distintivo para HOY */
        .turno-hoy { border-left: 5px solid #007AFF; background-color: #F0F7FF; }
        
        .btn-delete { background-color: #FF3B30; padding: 8px 12px; font-size: 0.85rem; color: white; border-radius: 8px; border: none; }
        .card-blue { background-color: #007AFF; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .historial { color: #8e8e93; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Nuevo Turno</h3>
        <input type="text" id="nombre" placeholder="Nombre del cliente">
        <input type="date" id="fecha" onchange="actualizarHorarios()">
        <select id="hora"><option>Selecciona fecha primero</option></select>
        <button onclick="guardarTurno()">Reservar</button>
    </div>

    <div class="card card-blue">
        <h3>Recaudación Semanal</h3>
        <p id="total-recaudado" style="font-size: 1.25rem; font-weight: bold; margin: 0;">$0</p>
    </div>

    <div class="card">
        <h3>Próximos Turnos</h3>
        <div id="contenedor-proximos"></div>
        <hr style="border: 0; border-top: 1px solid #f2f2f7; margin: 15px 0;">
        <h3 style="font-size: 0.9rem; color: #8e8e93;">Historial</h3>
        <div id="contenedor-historial"></div>
    </div>

    <script>
        const PRECIO_CORTE = 15000;
        const todosLosHorarios = ["10:20", "11:00", "11:40", "12:20", "13:00", "14:40", "15:20", "16:00", "16:40", "17:20", "18:00", "18:40", "19:20", "20:00", "20:40", "21:20"];
        let turnos = JSON.parse(localStorage.getItem('turnos_iphone')) || [];

        function renderizar() {
            turnos.sort((a, b) => new Date(a.fecha + 'T' + a.hora) - new Date(b.fecha + 'T' + b.hora));
            
            const hoy = new Date();
            hoy.setHours(0,0,0,0);
            const fechaHoyString = new Date().toISOString().split('T')[0];
            
            const proximos = document.getElementById('contenedor-proximos');
            const historial = document.getElementById('contenedor-historial');
            
            proximos.innerHTML = '';
            historial.innerHTML = '';

            turnos.forEach(t => {
                const fechaTurno = new Date(t.fecha + 'T00:00:00');
                const esPasado = fechaTurno < hoy;
                const esHoy = t.fecha === fechaHoyString;
                
                const html = `
                    <div class="turno-row ${esHoy ? 'turno-hoy' : ''}">
                        <div class="info-text">
                            <strong>${t.nombre}</strong>
                            <span class="${esPasado ? 'historial' : ''}">${t.fecha} • ${t.hora} hs ${esHoy ? '<b>(HOY)</b>' : ''}</span>
                        </div>
                        ${!esPasado ? `<button class="btn-delete" onclick="eliminarTurno(${t.id})">Anular</button>` : ''}
                    </div>`;
                
                if (esPasado) historial.innerHTML += html;
                else proximos.innerHTML += html;
            });

            if (proximos.innerHTML === '') proximos.innerHTML = '<p style="color:#8e8e93;">No hay turnos pendientes.</p>';
            calcularRecaudacion();
        }

        function calcularRecaudacion() {
            const hoy = new Date();
            const haceUnaSemana = new Date();
            haceUnaSemana.setDate(hoy.getDate() - 7);
            const total = turnos.filter(t => new Date(t.fecha + 'T00:00:00') >= haceUnaSemana && new Date(t.fecha + 'T00:00:00') <= hoy).length * PRECIO_CORTE;
            document.getElementById('total-recaudado').innerText = '$' + total.toLocaleString('es-AR');
        }

        function guardarTurno() {
            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            if (!nombre || !fecha || !hora) return alert("Completa todos los campos");
            turnos.push({ id: Date.now(), nombre, fecha, hora });
            localStorage.setItem('turnos_iphone', JSON.stringify(turnos));
            document.getElementById('nombre').value = '';
            actualizarHorarios();
            renderizar();
        }

        function eliminarTurno(id) {
            const turnoAEliminar = turnos.find(t => t.id === id);
            if (confirm(`¿Estás seguro de que quieres anular el turno de ${turnoAEliminar.nombre}?`)) {
                turnos = turnos.filter(t => t.id !== id);
                localStorage.setItem('turnos_iphone', JSON.stringify(turnos));
                actualizarHorarios();
                renderizar();
            }
        }

        function actualizarHorarios() {
            const fecha = document.getElementById('fecha').value;
            const select = document.getElementById('hora');
            const ocupados = turnos.filter(t => t.fecha === fecha).map(t => t.hora);
            select.innerHTML = '<option value="">Selecciona hora</option>';
            todosLosHorarios.forEach(h => { if (!ocupados.includes(h)) select.innerHTML += `<option value="${h}">${h}</option>`; });
        }

        renderizar();
    </script>
</body>
</html>
