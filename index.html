<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstyle - Gestión Pro</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 15px; }
        .card { background-color: #1c1c1e; border-radius: 12px; padding: 16px; margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 1.1rem; color: #fff; }
        input, select { width: 100%; padding: 12px; border: 1px solid #3a3a3c; border-radius: 10px; margin-bottom: 10px; background-color: #2c2c2e; color: white; }
        button { width: 100%; background-color: #007AFF; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; margin-bottom: 5px; }
        .turno-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #3a3a3c; }
        .btn-delete { background-color: #FF3B30; padding: 8px; border-radius: 8px; border: none; color: white; }
        .btn-pay { background-color: #34C759; padding: 8px; border-radius: 8px; border: none; color: white; }
        .card-blue { background-color: #007AFF; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Precio del corte ($)</h3>
        <input type="number" id="input-precio" onchange="guardarPrecioGlobal()">
    </div>

    <div class="card">
        <h3>Nuevo Turno</h3>
        <input type="text" id="nombre" placeholder="Nombre cliente">
        <input type="date" id="fecha">
        <select id="hora"><option>Selecciona hora</option></select>
        <select id="estado-pago">
            <option value="completo">Pagó completo</option>
            <option value="seña">Dejó una seña</option>
        </select>
        <input type="number" id="monto-entregado" placeholder="Monto entregado ($)">
        <button onclick="guardarTurno()">Reservar</button>
    </div>

    <div class="card-blue">
        <h3>Recaudación Real Semanal</h3>
        <p id="total-recaudado" style="font-size: 1.8rem; font-weight: bold; margin: 0;">$0</p>
    </div>

    <div class="card">
        <h3>Pendientes de Pago (Fiados)</h3>
        <div id="contenedor-pendientes"></div>
        <p><strong>Total en la calle: </strong> <span id="total-fiado">$0</span></p>
    </div>

    <script>
        let PRECIO = parseInt(localStorage.getItem('precio_corte')) || 15000;
        document.getElementById('input-precio').value = PRECIO;
        let turnos = JSON.parse(localStorage.getItem('turnos')) || [];
        let fiados = JSON.parse(localStorage.getItem('fiados')) || [];

        function guardarPrecioGlobal() {
            PRECIO = document.getElementById('input-precio').value;
            localStorage.setItem('precio_corte', PRECIO);
            renderizar();
        }

        function guardarTurno() {
            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const estado = document.getElementById('estado-pago').value;
            let entregado = parseInt(document.getElementById('monto-entregado').value) || 0;
            
            if (estado === 'completo') entregado = PRECIO;

            turnos.push({ id: Date.now(), nombre, fecha, hora, pagado: entregado });
            
            // Si quedó debiendo, se agrega a fiados automáticamente
            if (entregado < PRECIO) {
                fiados.push({ id: Date.now(), nombre, monto: (PRECIO - entregado) });
                localStorage.setItem('fiados', JSON.stringify(fiados));
            }

            localStorage.setItem('turnos', JSON.stringify(turnos));
            renderizar();
        }

        function pagarFiado(id) {
            const f = fiados.find(x => x.id === id);
            if (confirm(`¿Registrar pago de $${f.monto}?`)) {
                // Sumamos este pago al total real
                const totalActual = parseInt(localStorage.getItem('recaudado_manual') || 0);
                localStorage.setItem('recaudado_manual', totalActual + f.monto);
                
                fiados = fiados.filter(x => x.id !== id);
                localStorage.setItem('fiados', JSON.stringify(fiados));
                renderizar();
            }
        }

        function renderizar() {
            // Calcular lo que realmente entró al bolsillo
            let total = turnos.reduce((acc, t) => acc + t.pagado, 0);
            total += parseInt(localStorage.getItem('recaudado_manual') || 0);
            document.getElementById('total-recaudado').innerText = '$' + total.toLocaleString();

            const contFiados = document.getElementById('contenedor-pendientes');
            contFiados.innerHTML = '';
            let totalFiado = 0;
            fiados.forEach(f => {
                totalFiado += f.monto;
                contFiados.innerHTML += `<div class="turno-row">
                    ${f.nombre} (Debe: $${f.monto})
                    <button class="btn-pay" onclick="pagarFiado(${f.id})">Cobrar</button>
                </div>`;
            });
            document.getElementById('total-fiado').innerText = '$' + totalFiado.toLocaleString();
        }

        renderizar();
    </script>
</body>
</html>
