<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Alexstyle - Turnos</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F2F2F7; margin: 0; padding: 15px; }
        .card { background-color: #FFF; border-radius: 12px; padding: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; font-size: 1.1rem; color: #1c1c1e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #E5E5EA; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #007AFF; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 16px; }
        
        .turno-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f2f2f7; }
        .turno-row:last-child { border-bottom: none; }
        .info-text { font-size: 0.95rem; }
        .info-text strong { display: block; color: #000; font-size: 1rem; }
        .btn-delete { background-color: #FF3B30; padding: 8px 12px; font-size: 0.85rem; width: auto; color: white; border-radius: 8px; border: none; }
        
        /* Estilo compacto para la recaudación */
        .card-blue { 
            background-color: #007AFF; 
            color: white; 
            padding: 12px 16px !important; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .card-blue h3 { margin: 0; font-size: 0.95rem; color: white; opacity: 0.9; }
        .card-blue p { font-size: 1.25rem; font-weight: bold; margin: 0; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Nuevo Turno</h3>
        <input type="text" id="nombre" placeholder="Nombre del cliente">
        <input type="date" id="fecha" onchange="actualizarHorarios()">
        <select id="hora"><option>Selecciona fecha primero</option></select>
        <button onclick="guardarTurno()">Reservar</button>
    </div>

    <!-- Sección de Recaudación Semanal Compacta -->
    <div class="card card-blue">
        <h3>Recaudación Semanal</h3>
        <p id="total-recaudado">$0</p>
    </div>

    <div id="lista-turnos" class="card">
        <h3>Próximos Turnos</h3>
        <div id="contenedor-items"></div>
    </div>

    <script>
        const PRECIO_CORTE = 15000;
        const todosLosHorarios = ["10:20", "11:00", "11:40", "12:20", "13:00", "14:40", "15:20", "16:00", "16:40", "17:20", "18:00", "18:40", "19:20", "20:00", "20:40", "21:20"];
        let turnos = JSON.parse(localStorage.getItem('turnos_iphone')) || [];

        function ordenarTurnos() {
            turnos.sort((a, b) => new Date(a.fecha + 'T' + a.hora) - new Date(b.fecha + 'T' + b.hora));
        }

        function calcularRecaudacion() {
            const hoy = new Date();
            const haceUnaSemana = new Date();
            haceUnaSemana.setDate(hoy.getDate() - 7);

            const turnosSemana = turnos.filter(t => {
                const fechaTurno = new Date(t.fecha + 'T00:00:00');
                return fechaTurno >= haceUnaSemana && fechaTurno <= hoy;
            });

            const total = turnosSemana.length * PRECIO_CORTE;
            document.getElementById('total-recaudado').innerText = '$' + total.toLocaleString('es-AR');
        }

        function actualizarHorarios() {
            const fechaSeleccionada = document.getElementById('fecha').value;
            const selectHora = document.getElementById('hora');
            const ocupados = turnos.filter(t => t.fecha === fechaSeleccionada).map(t => t.hora);
            
            selectHora.innerHTML = '<option value="">Selecciona hora libre</option>';
            todosLosHorarios.forEach(h => {
                if (!ocupados.includes(h)) {
                    selectHora.innerHTML += `<option value="${h}">${h}</option>`;
                }
            });
        }

        function guardarTurno() {
            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;

            if (!nombre || !fecha || !hora) return alert("Por favor, completa todos los campos");

            turnos.push({ id: Date.now(), nombre, fecha, hora });
            ordenarTurnos();
            localStorage.setItem('turnos_iphone', JSON.stringify(turnos));
            
            document.getElementById('nombre').value = '';
            actualizarHorarios();
            renderizarTurnos();
            calcularRecaudacion();
        }

        function eliminarTurno(id) {
            turnos = turnos.filter(t => t.id !== id);
            localStorage.setItem('turnos_iphone', JSON.stringify(turnos));
            actualizarHorarios();
            renderizarTurnos();
            calcularRecaudacion();
        }

        function renderizarTurnos() {
            ordenarTurnos();
            const cont = document.getElementById('contenedor-items');
            cont.innerHTML = turnos.length === 0 ? '<p style="color:#8e8e93; font-size:0.9rem;">No hay turnos agendados.</p>' : '';
            
            turnos.forEach(t => {
                cont.innerHTML += `
                    <div class="turno-row">
                        <div class="info-text">
                            <strong>${t.nombre}</strong>
                            ${t.fecha} • ${t.hora} hs
                        </div>
                        <button class="btn-delete" onclick="eliminarTurno(${t.id})">Anular</button>
                    </div>`;
            });
        }

        renderizarTurnos();
        calcularRecaudacion();
    </script>
</body>
</html>
